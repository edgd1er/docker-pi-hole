name: Build Image and Publish
on:
  schedule:
    - cron: "0 5 * * *"
  push:
    branches:
      - development
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  dockerhub: ${{ secrets.DOCKERHUB_NAMESPACE }}/pihole
  components_branch: ${{ startsWith(github.ref, 'refs/heads/master') && 'master' || 'development' }}
  alpine_version: 3.24

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ${{ startsWith(matrix.platform, 'linux/arm') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          #- linux/386
          #- linux/arm/v6
          - linux/arm/v7
          - linux/arm64
          #- linux/riscv64
    env:
      CI_ARCH: ${{ matrix.platform }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Test
        run: CIPLATFORM=${{ env.CI_ARCH }} bash test/run.sh

  build-prepare:
    runs-on: ubuntu-24.04
    outputs:
      components_branch: ${{ env.components_branch }}
    steps:
      # FIXME: can't use env object in reusable workflow inputs: https://github.com/orgs/community/discussions/26671
      - run: echo "Exposing env vars for reusable workflow"

  build:
    uses: docker/github-builder/.github/workflows/build.yml@v1
    needs:
      - build-prepare
    permissions:
      contents: read # same as global permissions
      id-token: write # for signing attestation(s) with GitHub OIDC Token
      packages: write # required to push to GHCR
    with:
      setup-qemu: true
      cache: true
      cache-scope: build
      cache-mode: max
      fail-fast: true
      context: src
      output: image
      build-args: |
        PIHOLE_DOCKER_TAG={{meta.version}}
        FTL_BRANCH=${{ needs.build-prepare.outputs.components_branch }}
        CORE_BRANCH=${{ needs.build-prepare.outputs.components_branch }}
        WEB_BRANCH=${{ needs.build-prepare.outputs.components_branch }}
        PADD_BRANCH=${{ needs.build-prepare.outputs.components_branch }}
      platforms: linux/amd64,linux/386,linux/arm/v6,linux/arm/v7,linux/arm64,linux/riscv64
      push: ${{ github.event_name != 'pull_request' }}
      set-meta-labels: true
      meta-images: |
        edgd1er/pihole
      # ghcr.io/${{ github.repository_owner }}/pihole
      meta-tags: |
        #type=raw,value=nightly,enable=${{ github.event_name == 'push' }}
        type=raw,value=master,enable=${{ startsWith(github.ref, 'refs/heads/master') }}
        type=raw,value=develop,enable=${{ startsWith(github.ref, 'refs/heads/development') }}
        type=ref,event=tag
      meta-flavor: |
        latest=${{ startsWith(github.ref, 'refs/heads/master') }}
        #latest=${{ startsWith(github.ref, 'refs/tags/') }}
      # FIXME: GHCR does not support the referrers API and spams the registry with sha-tagged images when cosigned: https://github.com/docker/github-builder/issues/109
      sign: false
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASS }}
    #    - registry: ghcr.io
    #      username: ${{ github.repository_owner }}
    #      password: ${{ secrets.GITHUB_TOKEN }}
