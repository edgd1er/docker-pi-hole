name: Build and Publish (development)

permissions:
    contents: read

on:
    #schedule:
    #    -   cron: "0 5 * * *"
    #push:
    #  branches:
    #    - development
    workflow_dispatch:


env:
    dockerhub: ${{ secrets.DOCKERHUB_NAMESPACE }}/pihole
    components_branch: ${{ startsWith(github.ref, 'refs/heads/master') && 'master' || 'development' }}
    container: 3.24

jobs:
    build-prepare:
        runs-on: ubuntu-24.04
        outputs:
            components_branch: ${{ env.components_branch }}
            container: ${{ env.container }}
        steps:
            # FIXME: can't use env object in reusable workflow inputs: https://github.com/orgs/community/discussions/26671
            -   run: echo "Exposing env vars for reusable workflow"

    build:
        uses: docker/github-builder/.github/workflows/build.yml@v1
        needs:
            - build-prepare
        permissions:
            contents: read # same as global permissions
            id-token: write # for signing attestation(s) with GitHub OIDC Token
            packages: write # required to push to GHCR
        with:
            setup-qemu: true
            cache: true
            cache-scope: image
            cache-mode: 'max'
            fail-fast: true
            context: src
            output: image
            build-args: |
                PIHOLE_DOCKER_TAG={{meta.version}}
                CONTAINER=${{ needs.build-prepare.outputs.container }}
                FTL_BRANCH=${{ needs.build-prepare.outputs.components_branch }}
                CORE_BRANCH=${{ needs.build-prepare.outputs.components_branch }}
                WEB_BRANCH=${{ needs.build-prepare.outputs.components_branch }}
                PADD_BRANCH=${{ needs.build-prepare.outputs.components_branch }}
            #platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64,linux/riscv64
            platforms: linux/amd64,linux/arm/v7,linux/arm64
            push: ${{ github.event_name != 'pull_request' }}
            set-meta-labels: true
            meta-images: |
                edgd1er/pihole
            # ghcr.io/${{ github.repository_owner }}/pihole
            meta-tags: |
                type=schedule,pattern=nightly
                type=raw,value=nightly,enable=${{ github.event_name == 'push' }}
                type=raw,value=develop,enable=${{ github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/heads/development') }}
                type=raw,value=master,enable=${{ github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/heads/master') }}
                type=ref,event=tag
            meta-flavor: |
                latest=${{ startsWith(github.ref, 'refs/heads/master') }}
                # latest=${{ startsWith(github.ref, 'refs/tags/') }}
            # FIXME: GHCR does not support the referrers API and spams the registry with sha-tagged images when cosigned: https://github.com/docker/github-builder/issues/109
            sign: false
        secrets:
            registry-auths: |
                - registry: docker.io
                  username: ${{ secrets.DOCKERHUB_USER }}
                  password: ${{ secrets.DOCKER_TOKEN }}

    inspect:
        runs-on: ubuntu-24.04
        needs: build
        steps:
            - name: Inspect images
              run: |
                docker buildx imagetools inspect ${{ env.dockerhub }}:develop
